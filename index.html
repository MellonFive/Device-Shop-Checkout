<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="src/resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Device Shop Checkout | devChallenges.io</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="src/styles/reset.css" />
    <link rel="stylesheet" href="src/styles/variables.css" />
    <link rel="stylesheet" href="src/styles/body.css" />
    <link rel="stylesheet" href="src/styles/container.css" />
    <link rel="stylesheet" href="src/styles/header.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
    <link rel="stylesheet" href="src/styles/box-information.css" />
    <link rel="stylesheet" href="src/styles/itens-and-prices.css" />
    <link rel="stylesheet" href="src/styles/coupon-and-price-information.css" />
    <link rel="stylesheet" href="src/styles/contact-information.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1 class="title">Checkout<span class="itens-count">3 ITEMS</span></h1>
      </div>
      <main>
        <div class="box-information">
          <section class="itens-and-prices">
            <div class="itens">
              <div class="item">
                <div class="product">
                  <img
                    class="img-iphone"
                    src="src/resources/Gold.png"
                    alt="iPhone 12 Pro"
                  />
                  <div class="product-info">
                    <h2 class="subtitle">iPhone 12 Pro</h2>
                    <p class="emphasis">Golden</p>
                  </div>
                </div>
                <div class="price">
                  <p class="dolar">$999.00</p>
                  <img src="src/resources/close-icon.svg" alt="Remove item" />
                </div>
              </div>

              <div class="item">
                <div class="product">
                  <img
                    class="img-apple-watch"
                    src="src/resources/apple-watch.png"
                    alt="Apple Watch"
                  />
                  <div class="product-info">
                    <h2 class="subtitle">Apple Watch</h2>
                    <p class="emphasis">Blue</p>
                  </div>
                </div>
                <div class="price">
                  <p class="dolar">$399.00</p>
                  <img src="src/resources/close-icon.svg" alt="Remove item" />
                </div>
              </div>

              <div class="item">
                <div class="product">
                  <img
                    class="img-imac"
                    src="src/resources/imac.png"
                    alt="iMac"
                  />
                  <div class="product-info">
                    <h2 class="subtitle">iMac</h2>
                    <p class="emphasis">Green</p>
                  </div>
                </div>
                <div class="price">
                  <p class="dolar">$1199.00</p>
                  <img src="src/resources/close-icon.svg" alt="Remove item" />
                </div>
              </div>
            </div>
          </section>

          <hr />

          <section class="coupon-and-price-information">
            <form class="coupon-form">
              <input type="text" placeholder="Enter coupon code" />
              <button class="apply-coupon">Apply Coupon</button>
            </form>

            <div class="result-calc">
              <div class="names">
                <p class="label first">Sub total</p>
                <p class="label">Tax</p>
                <p class="label total-price">Total</p>
              </div>

              <div class="prices">
                <p class="price first">$2597.00</p>
                <p class="price">$623.28</p>
                <p class="price total-price">$3220.28</p>
              </div>
            </div>
          </section>
        </div>

        <div class="contact-information">
          <h2 class="subtitle">Contact Information</h2>
          <div class="contact-information-form">
            <form class="contact-form">
              <label for="name">First & Last name</label>
              <input type="text" id="name" placeholder="Enter first & last name"
              />

              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="Enter email address"
              />

              <div class="country_and_postal-code">
                <div class="wrapper-country">
                  <label for="country">Country</label>
                  <select id="country">
                    <option value="finland">Finland</option>
                    <option value="sweden">Sweden</option>
                    <option value="norway">Norway</option>
                    <option value="denmark">Denmark</option>
                  </select>
                </div>

                <div class="wrapper-postal-code">
                  <label for="postal-code">Postal Code</label>
                  <input type="text" id="postal-code" placeholder="00270" />
                </div>
              </div>

              <button class="continue">Continue</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
