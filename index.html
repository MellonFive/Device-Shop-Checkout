<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="src/resources/favicon.ico" type="image/x-icon" sizes="96x96" />

  <title>Device Shop Checkout | devChallenges.io</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"

  <link rel="stylesheet" href="src/styles/reset.css" />

  <link rel="stylesheet" href="src/styles/body.css" />

  <link rel="stylesheet" href="src/styles/header.css" />
  <link rel="stylesheet" href="src/styles/main.css" />
  <link rel="stylesheet" href="src/styles/box-information.css" />
</head>

<body>
  <div class="container">
    <div class="header">
      <h1 class="title">Checkout<span class="itens-count">3 ITEMS</span></h1>
    </div>
    <main>
      <div class="box-information">
        <section class="itens-and-prices">
          <div class="itens">
            <div class="item">
              <div class="product">
                <img src="src/resources/Gold.png" alt="iPhone 12 Pro" />
                <div class="product-info">
                  <h2 class="subtitle">iPhone 12 Pro</h2>
                  <p class="emphasis">Golden</p>
                </div>
                <p class="quantity">x 1</p>
              </div>
              <div class="price">
                <p class="dolar">$999.00</p>
                <img src="src/resources/close-icon.svg" alt="Remove item">
              </div>
            </div>

            <!-- Apple Watch

            Blue

            $399.00

            iMac

            Green

            $1199.00 -->
          </div>
          <!-- Enter coupon code

          Apply Coupon

          Sub total

          $2597.00

          Tax

          $623.28

          Total

          $3220.28 -->
        </section>
        
        <section class="contact-information">
        </section>

        <!-- Contact Information

        First & Last name

        Enter first & last name

        Email Address

        Enter email address

        Country

        Finland

        Postal Code

        00270

        Continue -->
      </div>
    </main>
